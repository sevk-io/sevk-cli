name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package (Unix)
        if: matrix.target != 'win32-x64'
        run: |
          cp dist/cli.js sevk
          chmod +x sevk
          tar -czf sevk-${{ matrix.target }}.tar.gz sevk

      - name: Package (Windows)
        if: matrix.target == 'win32-x64'
        shell: pwsh
        run: |
          Copy-Item dist/cli.js sevk.js
          Set-Content -Path sevk.cmd -Value '@node "%~dp0sevk.js" %*'
          Compress-Archive -Path sevk.js, sevk.cmd -DestinationPath sevk-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: sevk-${{ matrix.target }}
          path: sevk-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: |
            sevk-linux-x64.tar.gz
            sevk-linux-arm64.tar.gz
            sevk-darwin-arm64.tar.gz
            sevk-win32-x64.zip
          generate_release_notes: true
